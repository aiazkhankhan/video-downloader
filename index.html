<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Video Downloader</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome Logos ke liye -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1>TikTok Video Downloader</h1>
        <p>Download your favorite TikTok videos without watermark instantly!</p>

        <!-- Sirf TikTok Ka Single Bada Logo -->
        <div class="logo-container">
            <i class="fab fa-tiktok single-tiktok-logo"></i>
        </div>

        <div class="input-area">
            <input type="text" id="videoUrl" placeholder="Paste TikTok video link here...">
            <button id="fetchBtn">Fetch Video</button>
        </div>

        <!-- Loader/Spinner -->
        <div id="loader" class="loader" style="display: none;">
            <div class="spinner"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
