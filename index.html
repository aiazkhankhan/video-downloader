<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All-in-One Video Downloader</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="downloader-container">
        <h1>Universal Video Downloader</h1>
        <p>Download videos from Instagram, TikTok, Twitter, & Facebook without watermark!</p>

        <div class="platform-icons">
            <i class="fab fa-instagram" style="color: #E1306C;"></i>
            <i class="fab fa-tiktok" style="color: #000000;"></i>
            <i class="fab fa-twitter" style="color: #1DA1F2;"></i>
            <i class="fab fa-facebook" style="color: #1877F2;"></i>
        </div>

        <div class="input-area">
            <input type="text" id="videoUrl" placeholder="Paste video link here...">
            <button id="downloadBtn"><i class="fas fa-download"></i> Fetch Video</button>
        </div>

        <div class="loader" id="loader" style="display: none;"></div>

        <div class="result-area" id="resultArea" style="display: none;">
            <h3>Video Parsed Successfully!</h3>
            <a href="#" id="finalDownloadLink"><button class="success-btn"></button></a>
        </div>
    </div>

    <footer>
        <p>Designed with by Aizaz Khan</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
